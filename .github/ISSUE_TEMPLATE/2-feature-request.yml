name: "Feature request"
description: Suggest an idea for the project
labels: "feature request"
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting an idea. Please fill in as much of the template below as you're able to.
  - type: textarea
    attributes:
      label: Is your feature request related to a problem? Please describe.
      description: Describe the problem you are trying to solve.
  - type: textarea
    attributes:
      label: Describe the feature's behavior.
      description: Describe the desired behavior.
  - type: textarea
    attributes:
      label: Describe alternatives you've considered.
      description: Alternative solutions or features you have considered.
